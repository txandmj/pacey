services:
  pacey:
    build:
      context: .
      dockerfile: dockerfiles/single.Dockerfile
    container_name: pacey
    restart: unless-stopped
    ports:
      - "8000:8000"      # Frontend + API both served here
    volumes:
      - pacey_db:/var/lib/mysql          # MariaDB data persistence
      - pacey_uploads:/app/images        # Uploaded report images
      - pacey_tessdata:/root/.cache      # Tesseract language model cache
    environment:
      DB_HOST: 127.0.0.1
      DB_NAME: flask_app
      DB_USER: root
      DB_PASS: ""
      PORT: 8000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000', r => process.exit(r.statusCode < 500 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pacey_db:
  pacey_uploads:
  pacey_tessdata:
